   <!DOCTYPE html>
<html>
<head>
  <title>Const Object Example</title>
</head>
<body>

<script>
  // Create a constant object
  const student = {
    name: "Riya",
    age: 24,
    course: "Biotech"
  };

  // Modify properties of the const object
 student.age = prompt ("Enter your age:");
 student.course = prompt ("Enter your course:");


  // Add a new property
  student.grade = "A";

  // Display the updated object
          console.log("Student's detail:", student);

</script>

</body>
</html>
