<!DOCTYPE html>
<html>
    <head><title>togglestyle</title></head>
<body>
<p id="demo">Toggle Color</p>
<button onclick="toggleColor()">Toggle</button>

<script>
  let isBlue = false;
  function toggleColor() {
    const el = document.getElementById("demo");
    el.style.color = isBlue ? "black" : "blue";
    isBlue = !isBlue;
  }
</script>

</body>
</html>
