<!DOCTYPE html>
<html lang="en">
<head>
    <title>Document</title>
</head>
<body>
  <p id="demo">Style Change Example</p>
  <button onclick="changeStyle()">Apply Style</button>

    <script>
       function changeStyle() {
        const e1 = document.getElementById("demo");
        e1.style.color= "blue";
        e1.style.fontSize = "20px";
       } 
    </script>

</body>
</html>
